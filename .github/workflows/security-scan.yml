name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # weekly, catches new CVEs even with no new commits

permissions:
  contents: read
  security-events: write  # required for CodeQL to upload results

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Bandit
        run: pip install "bandit[sarif]"

      - name: Run Bandit (SARIF, for Security tab)
        run: bandit -r . -f sarif -o bandit-results.sarif --exit-zero
      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif

      - name: Run Bandit (HTML, for human viewing)
        run: bandit -r . -f html -o bandit-report.html --exit-zero
      - name: Upload Bandit HTML report (viewable, not zipped)
        uses: actions/upload-artifact@v7
        with:
          name: bandit-html-report
          path: bandit-report.html
          archive: false

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3