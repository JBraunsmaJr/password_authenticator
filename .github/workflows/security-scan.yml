name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # weekly, catches new CVEs even with no new commits

permissions:
  contents: read
  security-events: write  # required for CodeQL to upload results

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -f html -o bandit-results.html --exit-zero
        # --exit-zero so the job doesn't hard-fail; you still see results in the Security tab
      - name: Upload Bandit results
        uses: github/codeql-action/upload-html@v3
        with:
          sarif_file: bandit-results.html

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3